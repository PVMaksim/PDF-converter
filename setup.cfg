[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    build,
    dist,
    .venv,
    venv,
    .eggs,
    *.egg-info,
    alembic/versions,
    src/alembic/versions
select = E9,F63,F7,F82
show-source = true
statistics = true

# Ignore some common issues
ignore =
    E203,  # Whitespace before ':'
    W503,  # Line break before binary operator
    E501,  # Line too long (handled by max-line-length)
